apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: console-plugin-operator-fbc-4-22-on-pull-request
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[release-0.1]"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" && target_branch == "release-0.1" &&
      "catalog/v4.22/***".pathChanged()
    build.appstudio.openshift.io/repo: "https://github.com/openshift/ocp-secrets-management-console?rev={{revision}}"
    build.appstudio.redhat.com/commit_sha: "{{revision}}"
    build.appstudio.redhat.com/target_branch: "{{target_branch}}"
  labels:
    appstudio.openshift.io/application: console-plugin-operator-fbc-4-22
    appstudio.openshift.io/component: console-plugin-operator-fbc-4-22
    pipelines.appstudio.openshift.io/type: build
spec:
  params:
    - name: dockerfile
      value: catalog/v4.22/Containerfile
    - name: git-url
      value: "{{source_url}}"
    - name: image-expires-after
      value: 5d
    - name: output-image
      value: quay.io/redhat-user-workloads/secrets-management-console-tenant/console-plugin-operator-fbc-4-22:on-pr-{{revision}}
    - name: path-context
      value: catalog/v4.22
    - name: revision
      value: "{{revision}}"
  pipelineRef:
    name: fbc-builder
  workspaces:
    - name: git-auth
      secret:
        secretName: "{{ git_auth_secret }}"
