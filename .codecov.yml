codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: 50%
        threshold: 2%
        base: auto
    patch:
      default:
        target: 50%
        threshold: 5%
        base: auto

comment:
  layout: "header, diff, flags, components, footer"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes

ignore:
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/*.spec.js"
  - "**/*.spec.jsx"
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/coverage/**"
  - "integration-tests/**"
  - "i18n-scripts/**"
  - "scripts/**"
  - "webpack.config.ts"
  - "jest.config.ts"
  - "playwright.config.ts"
  - "eslint.config.mjs"
  - "setup-tests.ts"

flags:
  unit:
    paths:
      - src/
    carryforward: true
  e2e:
    paths:
      - src/
    carryforward: true
